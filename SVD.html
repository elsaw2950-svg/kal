    <h2>Kalkulator Singular Value Decomposition (SVD)</h2>
    
    <div class="instruksi">
        <p><strong>Petunjuk:</strong> Anda dapat mengubah angka elemen matriks <code>A</code> di dalam kotak kode di bawah ini secara langsung, lalu klik tombol <strong>"Hitung SVD"</strong> untuk melihat hasil dekomposisi dan rekonstruksinya.</p>
    </div>

    <div class="python-svd">
        <textarea style="width: 100%; height: 420px;">
import numpy as np

# Matriks 3x3 yang akan didekomposisi
A = np.array([
    [4, 1, 1],
    [-1, 3, 1],
    [1, 5, 2]
], dtype=float)

# Melakukan Singular Value Decomposition
U, S, VT = np.linalg.svd(A)

# Mengubah singular values (array 1D) menjadi matriks diagonal 3x3
Sigma = np.diag(S)

# Menampilkan Hasil Komputasi
print("=== MATRIKS U ===")
print(np.round(U, 4))

print("\n=== MATRIKS SIGMA (Σ) ===")
print(np.round(Sigma, 4))

print("\n=== MATRIKS V^T ===")
print(np.round(VT, 4))

print("\n" + "="*40)
# Verifikasi perkalian rekonstruksi A = U @ Sigma @ VT
A_rekonstruksi = U @ Sigma @ VT

print("\n=== HASIL REKONSTRUKSI (U @ Sigma @ V^T) ===")
print(np.round(A_rekonstruksi, 4))

print("\n=== MATRIKS A ASLI ===")
print(A)
        </textarea>
    </div>

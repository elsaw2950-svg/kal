<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transformasi Mendekati Sumbu X</title>

<style>
    body{
        margin:0;
        background:#0d1117;
        color:white;
        font-family:Arial;
        text-align:center;
    }

    h1{
        margin-top:20px;
    }

    canvas{
        background:white;
        margin-top:20px;
        border:2px solid #333;
    }
</style>
</head>
<body>

<h1>Transformasi Matriks Mendekati Sumbu X</h1>

<canvas id="canvas" width="600" height="600"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const points = {
    "A": [2, 3], "B": [2, 4], "C": [3, 4], "D": [3, 3],
    "E": [2,-3], "F": [3,-3], "G": [2,-4], "H": [3,-4],
    "I": [2, 2], "J": [3, 2], "K": [2, 1], "L": [3, 1],
    "M": [2,-1], "N": [3,-1], "O": [2,-2], "P": [3,-2]
};

const boxes = [
    ["A","B","C","D","A"],
    ["E","F","H","G","E"],
    ["I","J","L","K","I"],
    ["M","N","P","O","M"]
];

let frame = 0;

function toCanvasX(x){
    return x * 80 + 100;
}

function toCanvasY(y){
    return 300 - y * 80;
}

function draw(){

    ctx.clearRect(0,0,600,600);

    // grid
    ctx.strokeStyle = "#ddd";

    for(let i=0;i<600;i+=40){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,600);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0,i);
        ctx.lineTo(600,i);
        ctx.stroke();
    }

    // sumbu
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0,300);
    ctx.lineTo(600,300);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(100,0);
    ctx.lineTo(100,600);
    ctx.stroke();

    // faktor skala
    let k = 1 - frame/100;

    // matriks transformasi
    // [1 0]
    // [0 k]

    let transformed = {};

    for(let nama in points){

        let x = points[nama][0];
        let y = points[nama][1];

        let xBaru = x;
        let yBaru = y * k;

        transformed[nama] = [xBaru, yBaru];
    }

    // gambar kotak
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 3;

    boxes.forEach(box => {

        ctx.beginPath();

        box.forEach((titik,index)=>{

            let x = toCanvasX(transformed[titik][0]);
            let y = toCanvasY(transformed[titik][1]);

            if(index===0){
                ctx.moveTo(x,y);
            }else{
                ctx.lineTo(x,y);
            }
        });

        ctx.stroke();
    });

    // titik
    for(let nama in transformed){

        let x = toCanvasX(transformed[nama][0]);
        let y = toCanvasY(transformed[nama][1]);

        ctx.fillStyle = "red";

        ctx.beginPath();
        ctx.arc(x,y,5,0,Math.PI*2);
        ctx.fill();

        ctx.fillStyle = "black";
        ctx.fillText(nama,x+8,y-8);
    }

    // teks matriks
    ctx.fillStyle = "black";
    ctx.font = "18px Arial";

    ctx.fillText(
        `Matriks Transformasi = [[1,0],[0,${k.toFixed(2)}]]`,
        120,
        40
    );

    frame++;

    if(frame > 100){
        frame = 0;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
